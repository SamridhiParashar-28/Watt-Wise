<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" 
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" 
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="login-card">
    <div class="header">
      <h1>Welcome back</h1>
      <p>Sign in to continue to your account</p>
    </div>

    <form class="form-body" id="loginForm">
      <div class="input-group">
        <label for="username">Email or username</label>
        <input 
          type="text" 
          id="username" 
          placeholder="name@example.com" 
          required 
          autocomplete="username"
        >
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="••••••••" 
          required 
          autocomplete="current-password"
        >
        <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <!-- Optional: place for error messages -->
      <div id="error-message" class="error" style="display:none; color:#dc2626; font-size:0.9rem; margin-top:8px;"></div>

      <button type="submit" id="submitBtn">Sign in</button>
    </form>

    <div class="footer">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
