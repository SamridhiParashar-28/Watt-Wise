<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – WattWise</title>

  <!-- Font Awesome for eye icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Your global matrix-style stylesheet -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="login-card">
    <div class="header">
      <h1>NEW ACCOUNT</h1>
      <p>CREATE YOUR ACCOUNT</p>
    </div>

    <form class="form-body" id="registerForm">
      <!-- Username -->
      <div class="input-group">
        <label for="username">USERNAME</label>
        <input 
          type="text" 
          id="username" 
          placeholder="choose username" 
          required 
          autocomplete="username"
          minlength="3"
          maxlength="50"
        >
      </div>

      <!-- Password -->
      <div class="input-group">
        <label for="password">PASSWORD</label>
        <input 
          type="password" 
          id="password" 
          placeholder="••••••••" 
          required 
          autocomplete="new-password"
          minlength="6"
        >
        <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
      </div>

      <!-- Confirm Password -->
      <div class="input-group">
        <label for="confirmPassword">CONFIRM PASSWORD</label>
        <input 
          type="password" 
          id="confirmPassword" 
          placeholder="••••••••" 
          required 
          autocomplete="new-password"
        >
      </div>

      <!-- Message area (success / error) -->
      <div id="message" style="display:none; text-align:center; margin:16px 0; font-weight:bold; font-size:1.1rem;"></div>

      <!-- Submit button -->
      <button type="submit" id="submitBtn">REGISTER</button>
    </form>

    <div class="footer">
      Already have an account? <a href="index.html">SIGN IN</a>
    </div>
  </div>

  <!-- Your registration script -->
  <script src="js/register.js"></script>
</body>
</html>
