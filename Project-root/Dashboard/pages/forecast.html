<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WattWise – ML Forecast</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/shared.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head><body>
<aside class="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div class="topbar-left"><h2>ML FORECAST</h2><p>LSTM + XGBoost hybrid model &middot; 94.2% accuracy</p></div>
    <div class="topbar-right"><button class="btn" onclick="runForecast()"><i class="fas fa-rotate"></i> Run Now</button></div>
  </div>
  <p class="section-title">Model Info</p>
  <div class="grid-4">
    <div class="card"><div class="card-label"><i class="fas fa-brain"></i> Model</div><div class="card-value" style="font-size:1rem;margin-top:4px">LSTM+XGB</div><div class="card-sub">Hybrid ensemble</div></div>
    <div class="card"><div class="card-label"><i class="fas fa-percent"></i> Accuracy</div><div class="card-value">94.2%</div><div class="card-sub">On validation set</div></div>
    <div class="card"><div class="card-label"><i class="fas fa-clock"></i> Last Run</div><div class="card-value" style="font-size:1rem;margin-top:4px" id="lastRun">—</div><div class="card-sub">Forecast timestamp</div></div>
    <div class="card"><div class="card-label"><i class="fas fa-circle-check"></i> Status</div><div class="card-value" style="font-size:1rem;color:var(--accent);margin-top:4px" id="fStatus">Ready</div><div class="card-sub">Model loaded</div></div>
  </div>

  <p class="section-title">7-Day Forecast vs Actual — All Blocks</p>
  <div class="card" style="margin-bottom:1rem"><div class="chart-wrap" style="height:280px"><canvas id="forecastChart"></canvas></div></div>

  <p class="section-title">Next-Day Predictions</p>
  <div class="grid-3" id="forecastCards"></div>
</main>
<script src="../js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initSidebar('forecast');
  document.getElementById('lastRun').textContent = new Date().toLocaleTimeString('en-IN',{timeStyle:'short'});

  const blocks = ['G-H','B-H','AB1','AB2','ADMIN'];
  const colors = ['rgb(0,255,65)','rgb(0,200,50)','rgb(0,170,255)','rgb(255,170,0)','rgb(255,100,50)'];

  // forecast = actual + 5% noise for next 3 days
  const allDatasets = [];
  blocks.forEach((b,i) => {
    const actual = WW.blocks[b].daily;
    const forecast = [...actual.slice(0,5), ...actual.slice(0,2).map(v => +(v*(0.97+Math.random()*0.08)).toFixed(1))];
    allDatasets.push(dataset(WW.blocks[b].label+' Actual', actual, colors[i]));
    allDatasets.push({...dataset(WW.blocks[b].label+' Forecast', forecast, colors[i]), borderDash:[5,4], fill:false});
  });
  lineChart('forecastChart', WW.dates, allDatasets);

  document.getElementById('forecastCards').innerHTML = blocks.map((b,i) => {
    const B = WW.blocks[b];
    const pred = +(B.avg*(0.97+Math.random()*0.06)).toFixed(1);
    return `<div class="card">
      <div class="card-label"><i class="fas ${B.icon}"></i> ${B.label}</div>
      <div class="card-value">${pred}</div>
      <div class="card-sub">kWh predicted tomorrow</div>
      <div class="card-change ${pred > B.avg ? 'up':'down'}">
        <i class="fas fa-arrow-${pred>B.avg?'up':'down'}"></i> vs avg ${B.avg} kWh
      </div>
    </div>`;
  }).join('');
});

function runForecast() {
  const s = document.getElementById('fStatus');
  s.textContent = 'Running...'; s.style.color = 'var(--warn)';
  setTimeout(() => {
    s.textContent = 'Done ✓'; s.style.color = 'var(--accent)';
    document.getElementById('lastRun').textContent = new Date().toLocaleTimeString('en-IN',{timeStyle:'short'});
  }, 2500);
}
</script>
</body></html>
