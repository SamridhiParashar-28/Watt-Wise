<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WattWise – Consumption Trend</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/shared.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head><body>
<aside class="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div class="topbar-left"><h2>CONSUMPTION TREND</h2><p>Daily kWh — Jan 06–12, 2025</p></div>
  </div>
  <p class="section-title">All Blocks — Daily kWh</p>
  <div class="card" style="margin-bottom:1rem"><div class="chart-wrap" style="height:280px"><canvas id="trendChart"></canvas></div></div>

  <p class="section-title">Stacked Daily Total</p>
  <div class="card" style="margin-bottom:1rem"><div class="chart-wrap"><canvas id="stackChart"></canvas></div></div>

  <p class="section-title">Weekly Stats Table</p>
  <div class="card">
    <table class="data-table">
      <thead><tr><th>Block</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th><th>Total</th></tr></thead>
      <tbody id="statsTable"></tbody>
    </table>
  </div>
</main>
<script src="../js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initSidebar('consumption');
  const blocks = ['G-H','B-H','AB1','AB2','ADMIN'];
  const colors = ['rgb(0,255,65)','rgb(0,200,50)','rgb(0,170,255)','rgb(255,170,0)','rgb(255,100,50)'];

  lineChart('trendChart', WW.dates, blocks.map((b,i) =>
    dataset(WW.blocks[b].label, WW.blocks[b].daily, colors[i])
  ));

  // stacked bar
  const ctx = document.getElementById('stackChart').getContext('2d');
  new Chart(ctx, {
    type:'bar',
    data:{ labels:WW.dates,
      datasets: blocks.map((b,i) => ({
        label: WW.blocks[b].label, data: WW.blocks[b].daily,
        backgroundColor: colors[i].replace(')',',0.75)').replace('rgb','rgba'),
        borderColor: colors[i], borderWidth:1
      }))
    },
    options:{ ...JSON.parse(JSON.stringify(CHART_DEFAULTS)), scales:{...JSON.parse(JSON.stringify(CHART_DEFAULTS)).scales, x:{...JSON.parse(JSON.stringify(CHART_DEFAULTS)).scales?.x, stacked:true}, y:{...JSON.parse(JSON.stringify(CHART_DEFAULTS)).scales?.y, stacked:true} } }
  });

  document.getElementById('statsTable').innerHTML = blocks.map(b => {
    const B = WW.blocks[b];
    return `<tr><td style="color:var(--accent)">${B.label}</td>${B.daily.map(v=>`<td>${v}</td>`).join('')}<td style="color:var(--accent)">${B.total}</td></tr>`;
  }).join('');
});
</script>
</body></html>
