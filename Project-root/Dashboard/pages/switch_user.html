<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WattWise – Switch User</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
<link rel="stylesheet" href="../css/shared.css"/>
</head><body>
<aside class="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div class="topbar-left"><h2>SWITCH USER</h2><p>Sign in as a different account</p></div>
  </div>
  <p class="section-title">Current Session</p>
  <div class="card" style="max-width:400px;margin-bottom:1.5rem">
    <div class="card-label"><i class="fas fa-user"></i> Logged in as</div>
    <div class="card-value" style="font-size:1.2rem" id="currentUserDisp">—</div>
    <div class="card-sub">Campus Admin</div>
    <button class="btn btn-full" style="margin-top:12px;border-color:var(--danger);color:var(--danger)" onclick="doLogout()">
      <i class="fas fa-right-from-bracket"></i> Sign Out
    </button>
  </div>
  <p class="section-title">Sign In as Different User</p>
  <div class="card" style="max-width:400px">
    <div class="card-label"><i class="fas fa-user-plus"></i> Switch Account</div>
    <div style="margin-top:10px;font-size:0.78rem;color:var(--text3);margin-bottom:12px">
      This will sign you out of the current session and take you to the login page.
    </div>
    <button class="btn btn-full" onclick="doLogout()">
      <i class="fas fa-arrow-right-to-bracket"></i> Go to Login Page
    </button>
    <div style="margin-top:8px;font-size:0.7rem;color:var(--text3)">
      Don't have an account? <a href="../../public/register.html" style="color:var(--accent2)">Register here</a>
    </div>
  </div>
</main>
<script src="../js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initSidebar('switch_user');
  document.getElementById('currentUserDisp').textContent = localStorage.getItem('username') || 'Unknown';
});
function doLogout() { localStorage.clear(); window.location.replace(getPublicLogin()); }
</script>
</body></html>
